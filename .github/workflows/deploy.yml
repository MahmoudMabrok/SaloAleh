name: Deploy

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.0) — used for Android versionName and iOS MARKETING_VERSION'
        required: true
        default: ''
      track:
        description: 'Google Play track (internal / alpha / beta / production)'
        required: true
        default: 'internal'

jobs:
  deploy-android:
    name: Deploy Android → Google Play
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Bump versionCode and versionName
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          CURRENT_CODE=$(grep 'versionCode = ' app/build.gradle.kts | grep -o '[0-9]*')
          NEW_CODE=$((CURRENT_CODE + 1))
          echo "versionCode: $CURRENT_CODE → $NEW_CODE"
          echo "versionName: $VERSION_NAME"
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign AAB
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: tools.mo3ta.salo
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}

  deploy-ios:
    name: Deploy iOS → App Store
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Bump CURRENT_PROJECT_VERSION and MARKETING_VERSION
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
          CURRENT_BUILD=$(grep 'CURRENT_PROJECT_VERSION' "$PBXPROJ" | head -1 | grep -o '[0-9]*')
          NEW_BUILD=$((CURRENT_BUILD + 1))
          echo "CURRENT_PROJECT_VERSION: $CURRENT_BUILD → $NEW_BUILD"
          echo "MARKETING_VERSION: $VERSION_NAME"
          sed -i '' "s/CURRENT_PROJECT_VERSION = $CURRENT_BUILD/CURRENT_PROJECT_VERSION = $NEW_BUILD/g" "$PBXPROJ"
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $VERSION_NAME/g" "$PBXPROJ"

      - name: Decode GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > iosApp/iosApp/GoogleService-Info.plist

      - name: Import distribution certificate
        run: |
          echo "${{ secrets.IOS_DIST_CERT_BASE64 }}" | base64 --decode > dist_cert.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import dist_cert.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_DIST_CERT_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain

      - name: Install provisioning profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install CocoaPods dependencies
        run: |
          cd iosApp
          pod install --repo-update

      - name: Archive
        run: |
          xcodebuild \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme SaloAleh \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SaloAleh.xcarchive \
            archive

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Export & Upload IPA
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/SaloAleh.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "${KEY_ID}" \
            -authenticationKeyIssuerID "${ISSUER_ID}"

  commit-version-bump:
    name: Commit version bump
    runs-on: ubuntu-latest
    needs: [deploy-android, deploy-ios]
    if: always() && (needs.deploy-android.result == 'success' || needs.deploy-ios.result == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Apply version bumps for succeeded jobs
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"

          if [ "${{ needs.deploy-android.result }}" = "success" ]; then
            CURRENT_CODE=$(grep 'versionCode = ' app/build.gradle.kts | grep -o '[0-9]*')
            NEW_CODE=$((CURRENT_CODE + 1))
            sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
            sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts
            echo "Android versionCode: $CURRENT_CODE → $NEW_CODE"
          else
            echo "Android deploy failed — skipping Android version bump"
          fi

          if [ "${{ needs.deploy-ios.result }}" = "success" ]; then
            PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
            CURRENT_BUILD=$(grep 'CURRENT_PROJECT_VERSION' "$PBXPROJ" | head -1 | grep -o '[0-9]*')
            NEW_BUILD=$((CURRENT_BUILD + 1))
            sed -i "s/CURRENT_PROJECT_VERSION = $CURRENT_BUILD/CURRENT_PROJECT_VERSION = $NEW_BUILD/g" "$PBXPROJ"
            sed -i "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $VERSION_NAME/g" "$PBXPROJ"
            echo "iOS build: $CURRENT_BUILD → $NEW_BUILD"
          else
            echo "iOS deploy failed — skipping iOS version bump"
          fi

          echo "Version name: $VERSION_NAME"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts iosApp/iosApp.xcodeproj/project.pbxproj
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ github.event.inputs.version_name }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
