name: Populate Round Leaderboard

on:
  # Runs every hour. Script computes active roundKey and isFinal internally.
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      round_key:
        description: 'Round key to populate (yyyy-MM-dd). Defaults to today in Cairo timezone.'
        required: false
        default: ''

jobs:
  populate:
    name: Write leaderboard to Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin
        working-directory: scripts

      - name: Populate leaderboard
        run: node scripts/populate-leaderboard.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          ROUND_KEY: ${{ github.event.inputs.round_key }}
